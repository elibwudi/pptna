<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>讲稿生成结果 - PPT讲稿AI生成系统</title>
    <!-- !!! 关键改动：引用新的、专门为结果页设计的CSS文件 !!! -->
    <link rel="stylesheet" href="{{ url_for('static', filename='results_style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <div class="logo">
                <i class="fas fa-presentation"></i>
                <h1>PPT讲稿AI生成系统</h1>
            </div>
        </div>
    </header>

    <main>
        <div class="container result-container">
            <h2 class="section-title">讲稿生成结果</h2>
            
            <div id="status-container" class="status-container">
                <div id="loading-indicator" class="loading-indicator">
                    <div class="spinner"></div>
                    <p>正在处理中，请稍候... <span id="progress-text"></span></p>
                </div>
                <div id="error-message" class="alert alert-error hidden"></div>
                <div id="action-buttons" class="action-buttons hidden">
                    <!-- 下载按钮将由JS动态生成 -->
                </div>
            </div>

            <div id="results-grid" class="results-grid hidden">
                <!-- 结果将由JS动态生成 -->
            </div>
        </div>
    </main>
    
    <footer class="main-footer">
        <div class="container">
            <p>由 Gemini, DeepSeek & Ollama 强力驱动</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const sessionId = "{{ session_id }}";
            const loadingIndicator = document.getElementById('loading-indicator');
            const errorMessage = document.getElementById('error-message');
            const actionButtons = document.getElementById('action-buttons');
            const resultsGrid = document.getElementById('results-grid');
            const progressText = document.getElementById('progress-text');

            function checkStatus() {
                fetch(`/status/${sessionId}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'processing') {
                            progressText.textContent = `(${data.progress || '...'})`;
                        } else if (data.status === 'complete') {
                            loadingIndicator.classList.add('hidden');
                            actionButtons.classList.remove('hidden');
                            resultsGrid.classList.remove('hidden');
                            
                            actionButtons.innerHTML = `<a href="/download/${data.ppt_filename}" class="action-btn download-ppt"><i class="fas fa-file-powerpoint"></i> 下载讲稿PPT</a><a href="/download/${data.txt_filename}" class="action-btn download-txt"><i class="fas fa-file-alt"></i> 下载讲稿全文(.txt)</a><a href="/" class="action-btn return-home"><i class="fas fa-home"></i> 返回首页</a>`;

                            let resultsHTML = '';
                            data.slides_data.forEach(slide => {
                                const formattedNotes = slide.notes.replace(/\n/g, '<br>');
                                resultsHTML += `<div class="slide-result-row" id="slide-${slide.slide_number}"><div class="slide-image-container"><div class="slide-number-badge">第 ${slide.slide_number} 页</div><img src="/static/placeholder.png" alt="第 ${slide.slide_number} 页幻灯片预览"></div><div class="slide-notes-container"><h3><i class="fas fa-microphone-alt"></i> 第 ${slide.slide_number} 页讲稿</h3><div class="notes-content"><p>${formattedNotes}</p></div></div></div>`;
                            });
                            resultsGrid.innerHTML = resultsHTML;

                            return; 
                        } else if (data.status === 'error') {
                            loadingIndicator.classList.add('hidden');
                            errorMessage.textContent = `处理失败: ${data.message}`;
                            errorMessage.classList.remove('hidden');
                            actionButtons.innerHTML = `<a href="/" class="action-btn return-home"><i class="fas fa-home"></i> 返回首页</a>`;
                            actionButtons.classList.remove('hidden');
                            return;
                        }
                        setTimeout(checkStatus, 3000);
                    })
                    .catch(error => {
                        console.error('Error fetching status:', error);
                        errorMessage.textContent = '无法获取任务状态，请检查网络或联系管理员。';
                        errorMessage.classList.remove('hidden');
                    });
            }
            checkStatus();
        });
    </script>
</body>
</html>
